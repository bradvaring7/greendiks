<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Brad Varing - Customer Service Tier 3 Call Flow</title>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="fixed-top">Brad Varing</div>
  <nav class="sidebar">
    <a href="index.html"><span class="material-symbols-outlined sidebar-icon" title="Home">home</span></a>
    <a href="callflow.html"><span class="material-symbols-outlined icon-active sidebar-icon"
        title="Call Flow">call</span></a>
    <a href="essentials.html"><span class="material-symbols-outlined sidebar-icon"
        title="Essentials">home_repair_service</a>
    <a href="scheduling.html"><span class="material-symbols-outlined sidebar-icon"
        title="Scheduling">calendar_month</span></a>
    <a href="billing.html"><span class="material-symbols-outlined sidebar-icon" title="Billing">receipt_long</span></a>
    <a href="services.html"><span class="material-symbols-outlined sidebar-icon"
        title="Services">house_with_shield</span></a>
    <a href="prosupport.html"><span class="material-symbols-outlined sidebar-icon"
        title="Pro Support">shield_person</span></a>
  </nav>
  <div class="dashboard-container">
    <main class="main-content">
      <div class="section-title">Call Flow</div>
      <div class="welcome-message">

      </div>
      <section class="accordion" id="pros">
        <div class="accordion-header">
          <div><span class="material-symbols-outlined symbols txtr">call</span>Service Pros</div>
          <span class="material-symbols-outlined chevron">chevron_right</span>
        </div>
        <div class="accordion-content">
          <ul>
            <li>Route Pro 
        </div>
      </section>

    </main>
  </div>
  <footer class="footer footer-center">Brad Varing &copy; 2025</footer>
  <script>
    document.querySelectorAll('.accordion-header').forEach(header => {
      header.addEventListener('click', function () {
        const accordion = this.parentElement;
        accordion.classList.toggle('open');
      });
    });
  </script>

</body>

</html>
